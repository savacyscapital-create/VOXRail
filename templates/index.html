<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoxRail — Railway AI Assistant</title>

  <!-- PWA support -->
  <meta name="theme-color" content="#0f2c5e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="VoxRail">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Design tokens ──────────────────────────────────── */
    :root {
      --rail:        #0f2c5e;
      --rail-mid:    #1a4080;
      --rail-light:  #2563eb;
      --amber:       #f59e0b;
      --danger:      #dc2626;
      --danger-soft: #fee2e2;
      --warning:     #d97706;
      --warning-soft:#fef3c7;
      --hazard:      #7c3aed;
      --hazard-soft: #ede9fe;
      --fmea:        #0891b2;
      --fmea-soft:   #cffafe;
      --surface:     #f4f6fb;
      --card:        #ffffff;
      --border:      #dde3ef;
      --text:        #111827;
      --muted:       #6b7280;
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--surface);
      color: var(--text);
      height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Modal ───────────────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(10,22,50,0.75);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    #modal-overlay.hidden { display: none; }
    #modal {
      background: var(--card); border-radius: 20px;
      padding: 44px 40px; width: min(460px, 92vw);
      box-shadow: 0 32px 80px rgba(0,0,0,0.28);
      display: flex; flex-direction: column; gap: 22px;
    }
    .modal-logo {
      font-family: 'Syne', sans-serif; font-size: 2rem;
      font-weight: 800; color: var(--rail); letter-spacing: -0.5px;
    }
    .modal-logo span { color: var(--amber); }
    .modal-tagline { color: var(--muted); font-size: 0.93rem; line-height: 1.6; }
    .modal-label {
      font-size: 0.78rem; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 6px; display: block;
    }
    #project-input {
      width: 100%; padding: 13px 16px;
      border: 2px solid var(--border); border-radius: 10px;
      font-family: 'DM Mono', monospace; font-size: 1rem; color: var(--rail);
      outline: none; transition: border-color 0.18s;
    }
    #project-input:focus { border-color: var(--rail-light); }
    #start-btn {
      padding: 14px; background: var(--rail); color: white;
      border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.18s;
    }
    #start-btn:hover { background: var(--rail-mid); }

    /* ── Header ──────────────────────────────────────────── */
    header {
      background: var(--rail); color: white;
      height: 58px; padding: 0 18px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; box-shadow: 0 2px 14px rgba(0,0,0,0.2);
      gap: 10px;
    }
    .header-logo {
      font-family: 'Syne', sans-serif; font-size: 1.2rem;
      font-weight: 800; letter-spacing: -0.3px; flex-shrink: 0;
    }
    .header-logo span { color: var(--amber); }
    #train-badge {
      font-family: 'DM Mono', monospace; font-size: 0.68rem;
      color: rgba(255,255,255,0.5); flex: 1; text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .header-right {
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
    }
    #project-badge {
      font-family: 'DM Mono', monospace; font-size: 0.72rem;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
      padding: 4px 10px; border-radius: 20px;
      max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .counter-pill {
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 3px 8px; border-radius: 20px;
      display: flex; gap: 4px; align-items: center;
    }
    .counter-pill .label { opacity: 0.55; }
    .counter-pill .value { font-weight: 500; }
    .counter-pill.uc  { background: rgba(37,99,235,0.3);  } .counter-pill.uc  .value { color: #93c5fd; }
    .counter-pill.tc  { background: rgba(16,185,129,0.2); } .counter-pill.tc  .value { color: #6ee7b7; }
    .counter-pill.fm  { background: rgba(8,145,178,0.25); } .counter-pill.fm  .value { color: #67e8f9; }
    .counter-pill.hz  { background: rgba(124,58,237,0.3); } .counter-pill.hz  .value { color: #c4b5fd; }

    /* ── Messages ────────────────────────────────────────── */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 24px 20px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Message rows ─────────────────────────────────────── */
    .msg-row {
      display: flex; gap: 9px; align-items: flex-end;
      animation: fadeUp 0.2s ease;
    }
    .msg-row.user { flex-direction: row-reverse; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      font-family: 'Syne', sans-serif; font-size: 0.65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .avatar.ai   { background: var(--rail); color: white; }
    .avatar.user { background: var(--amber); color: var(--rail); }

    .bubble {
      max-width: 78%; padding: 12px 16px;
      border-radius: 18px; line-height: 1.55; font-size: 0.91rem;
    }
    .bubble.user {
      background: var(--rail); color: white; border-bottom-right-radius: 5px;
    }
    .bubble.ai {
      background: var(--card); color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    /* ── Alert banners ────────────────────────────────────── */
    .scope-alert {
      background: var(--danger-soft); border: 1.5px solid var(--danger);
      border-radius: 9px; padding: 9px 13px;
      font-size: 0.83rem; color: var(--danger); font-weight: 500;
      margin-bottom: 10px;
    }
    .safety-notice {
      background: var(--warning-soft); border: 1.5px solid var(--warning);
      border-radius: 9px; padding: 9px 13px;
      font-size: 0.82rem; color: var(--warning); font-weight: 500;
      margin-bottom: 10px;
    }

    /* ── Artefact badges ──────────────────────────────────── */
    .artefact-badge {
      display: inline-block; font-family: 'DM Mono', monospace;
      font-size: 0.68rem; font-weight: 500; letter-spacing: 0.06em;
      padding: 2px 8px; border-radius: 4px; margin-bottom: 10px;
      text-transform: uppercase;
    }
    .badge-fmea   { background: var(--fmea-soft);   color: var(--fmea);   }
    .badge-hazard { background: var(--hazard-soft);  color: var(--hazard); }
    .badge-uc     { background: #dbeafe; color: var(--rail-light); }
    .badge-tc     { background: #d1fae5; color: #065f46; }
    .badge-sd     { background: #f0f4ff; color: var(--rail); }

    /* ── Markdown ─────────────────────────────────────────── */
    .bubble.ai strong  { font-weight: 600; color: var(--rail); }
    .bubble.ai em      { font-style: italic; color: var(--muted); }
    .bubble.ai h1, .bubble.ai h2, .bubble.ai h3 {
      font-family: 'Syne', sans-serif; font-weight: 700; color: var(--rail);
      margin: 14px 0 5px;
    }
    .bubble.ai h1 { font-size: 1.1rem; }
    .bubble.ai h2 { font-size: 1rem; }
    .bubble.ai h3 { font-size: 0.92rem; }
    .bubble.ai ul, .bubble.ai ol { margin: 7px 0 7px 18px; }
    .bubble.ai li  { margin-bottom: 3px; }
    .bubble.ai p   { margin: 5px 0; }
    .bubble.ai hr  { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .bubble.ai code {
      background: #f0f4ff; padding: 2px 5px; border-radius: 4px;
      font-family: 'DM Mono', monospace; font-size: 0.83em;
    }
    .bubble.ai pre {
      background: #f0f4ff; padding: 10px 12px; border-radius: 8px;
      font-size: 0.82em; overflow-x: auto; margin: 8px 0;
    }
    .bubble.ai pre code { background: none; padding: 0; }

    /* ── Tables ───────────────────────────────────────────── */
    .bubble.ai table {
      border-collapse: collapse; width: 100%; font-size: 0.8rem;
      margin: 10px 0; display: block; overflow-x: auto;
    }
    .bubble.ai th {
      background: var(--rail); color: white;
      padding: 7px 10px; text-align: left;
      font-family: 'DM Mono', monospace; font-size: 0.73rem;
    }
    .bubble.ai td {
      padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: top;
    }
    .bubble.ai tr:nth-child(even) td { background: #f9fafc; }

    /* ── Diagrams ─────────────────────────────────────────── */
    .diagram-wrap {
      background: #eef2ff; border: 1.5px solid #c7d5f5;
      border-radius: 12px; margin: 12px 0; padding: 14px 14px 10px;
    }
    .diagram-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .diagram-label {
      font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--rail);
      font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .dl-btn {
      background: var(--rail); color: white; border: none;
      padding: 5px 12px; border-radius: 6px;
      font-family: 'DM Mono', monospace; font-size: 0.74rem;
      cursor: pointer; transition: background 0.15s;
    }
    .dl-btn:hover { background: var(--rail-light); }
    .mermaid-render { text-align: center; }
    .mermaid-render svg { max-width: 100%; height: auto; }

    /* ── Typing indicator ─────────────────────────────────── */
    #typing-indicator { display: none; }
    #typing-indicator.visible { display: flex; }
    .typing-bubble {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; border-bottom-left-radius: 5px;
      padding: 12px 16px; display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--rail-light); animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0);   opacity: 0.45; }
      40%          { transform: translateY(-6px); opacity: 1;    }
    }

    /* ── Input bar ────────────────────────────────────────── */
    #input-bar {
      padding: 13px 18px; background: var(--card);
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: center; flex-shrink: 0;
    }
    #user-input {
      flex: 1; padding: 12px 18px;
      border: 2px solid var(--border); border-radius: 9999px;
      font-size: 0.93rem; font-family: 'Inter', sans-serif; color: var(--text);
      outline: none; transition: border-color 0.18s; background: var(--surface);
    }
    #user-input:focus   { border-color: var(--rail-light); background: white; }
    #user-input:disabled { opacity: 0.5; cursor: not-allowed; }
    #send-btn {
      padding: 12px 22px; background: var(--rail); color: white;
      border: none; border-radius: 9999px;
      font-family: 'Syne', sans-serif; font-size: 0.87rem; font-weight: 700;
      cursor: pointer; transition: background 0.18s; white-space: nowrap;
    }
    #send-btn:hover    { background: var(--rail-mid); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Mobile responsive ────────────────────────────────── */
    @media (max-width: 768px) {
      header { padding: 0 12px; height: 52px; }

      /* Hide train badge on small screens */
      #train-badge { display: none; }

      /* Compact counter pills */
      .header-right { gap: 5px; }
      .counter-pill { padding: 3px 6px; font-size: 0.62rem; }
      #project-badge { max-width: 100px; font-size: 0.65rem; padding: 3px 8px; }

      /* Full width bubbles */
      .bubble { max-width: 92%; font-size: 0.88rem; }

      /* Larger touch targets */
      #send-btn { padding: 12px 16px; min-width: 64px; font-size: 0.82rem; }
      .dl-btn   { padding: 7px 12px; font-size: 0.78rem; }

      /* Input area */
      #input-bar { padding: 10px 12px; gap: 8px; }
      #user-input { padding: 11px 16px; font-size: 0.88rem; }

      /* Modal */
      #modal { padding: 32px 24px; gap: 18px; }
      .modal-logo { font-size: 1.7rem; }

      /* Messages padding */
      #messages { padding: 16px 12px; gap: 12px; }

      /* Tables scroll on small screens */
      .bubble.ai table { font-size: 0.72rem; }
      .bubble.ai th, .bubble.ai td { padding: 5px 7px; }
    }

    @media (max-width: 480px) {
      /* Hide UC/TC/FM/HZ labels on very small screens, keep values */
      .counter-pill .label { display: none; }
      .counter-pill { padding: 3px 7px; }
    }
  </style>
</head>
<body>

  <!-- ── Project modal ──────────────────────────────────── -->
  <div id="modal-overlay">
    <div id="modal">
      <div class="modal-logo">Vox<span>Rail</span></div>
      <p class="modal-tagline">
        Railway Systems Engineer AI — Use Cases, Test Specifications,
        State Diagrams, FMEA, and Hazard Log for your project.
      </p>
      <div>
        <label class="modal-label" for="project-input">Project Name</label>
        <input type="text" id="project-input"
               placeholder="e.g. Crossrail Phase 2" autocomplete="off" maxlength="80">
      </div>
      <button id="start-btn">Start Session →</button>
    </div>
  </div>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header>
    <div class="header-logo">Vox<span>Rail</span></div>
    <div id="train-badge"></div>
    <div class="header-right">
      <div id="project-badge">NO PROJECT</div>
      <div class="counter-pill uc">
        <span class="label">UC</span><span class="value" id="uc-count">0</span>
      </div>
      <div class="counter-pill tc">
        <span class="label">TC</span><span class="value" id="tc-count">0</span>
      </div>
      <div class="counter-pill fm">
        <span class="label">FM</span><span class="value" id="fm-count">0</span>
      </div>
      <div class="counter-pill hz">
        <span class="label">HZ</span><span class="value" id="hz-count">0</span>
      </div>
    </div>
  </header>

  <!-- ── Messages ───────────────────────────────────────── -->
  <div id="messages">
    <div class="msg-row" id="typing-indicator">
      <div class="avatar ai">VR</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>

  <!-- ── Input bar ──────────────────────────────────────── -->
  <div id="input-bar">
    <input type="text" id="user-input"
           placeholder="Ask for a Use Case, Test Spec, State Diagram, FMEA, or Hazard Log…"
           autocomplete="off" disabled>
    <button id="send-btn" disabled>Send</button>
  </div>

  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });

    // ── State ──────────────────────────────────────────────
    let projectName  = "{{ project_name | default('') }}";
    let diagramIndex = 0;

    // ── Modal ──────────────────────────────────────────────
    const modalOverlay = document.getElementById('modal-overlay');
    const projectInput = document.getElementById('project-input');

    function startSession(name) {
      if (!name || !name.trim()) { projectInput.focus(); return; }
      projectName = name.trim();
      modalOverlay.classList.add('hidden');
      document.getElementById('user-input').disabled = false;
      document.getElementById('send-btn').disabled   = false;
      updateHeader({ project: projectName, uc_counter: 0, tc_counter: 0,
                     fmea_counter: 0, hz_counter: 0, train_type: null });
      document.getElementById('user-input').focus();
      addWelcome(projectName);
    }

    // If server already knows the project (returning session via cookie)
    if (projectName && projectName !== 'Default Project') startSession(projectName);

    document.getElementById('start-btn').addEventListener('click',
      () => startSession(projectInput.value));
    projectInput.addEventListener('keydown',
      e => { if (e.key === 'Enter') startSession(projectInput.value); });

    // ── Header ─────────────────────────────────────────────
    function updateHeader(data) {
      if (data.project)
        document.getElementById('project-badge').textContent =
          data.project.toUpperCase().slice(0, 22);
      if (typeof data.uc_counter   === 'number')
        document.getElementById('uc-count').textContent = data.uc_counter;
      if (typeof data.tc_counter   === 'number')
        document.getElementById('tc-count').textContent = data.tc_counter;
      if (typeof data.fmea_counter === 'number')
        document.getElementById('fm-count').textContent = data.fmea_counter;
      if (typeof data.hz_counter   === 'number')
        document.getElementById('hz-count').textContent = data.hz_counter;
      if (data.train_type)
        document.getElementById('train-badge').textContent = data.train_type;
    }

    // ── Welcome message ────────────────────────────────────
    function addWelcome(name) {
      const code = name.trim().split(/\s+/).map(w => w[0].toUpperCase()).join('');
      appendAI(
        `Hello! I'm **VoxRail**, your Railway Systems Engineer AI for ` +
        `**${escHtml(name)}** (code: **${code}**).\n\n` +
        `I can generate:\n` +
        `- **Use Cases** — e.g. "Create a use case for door closing"\n` +
        `- **Test Specifications** — e.g. "Test spec for this use case"\n` +
        `- **State Transition Diagrams** — e.g. "State diagram for door states"\n` +
        `- **FMEA** — e.g. "Generate FMEA for this use case"\n` +
        `- **Hazard Log** — e.g. "Generate hazard log from the FMEA"\n\n` +
        `What shall we work on first?`
      );
    }

    // ── Send message ───────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text  = input.value.trim();
      if (!text) return;

      appendUser(text);
      input.value = '';
      setLoading(true);

      try {
        const res = await fetch('/chat', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: text, project: projectName })
        });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const data = await res.json();
        updateHeader(data);
        appendAI(data.content);
      } catch (err) {
        appendAI(`⚠️ **Connection error**: ${escHtml(err.message)}\n\nIs the VoxRail server running?`);
      } finally {
        setLoading(false);
      }
    }

    // ── Loading state ──────────────────────────────────────
    function setLoading(on) {
      document.getElementById('send-btn').disabled   = on;
      document.getElementById('user-input').disabled = on;
      const ind = document.getElementById('typing-indicator');
      if (on) {
        ind.classList.add('visible');
        document.getElementById('messages').appendChild(ind);
        scrollBottom();
      } else {
        ind.classList.remove('visible');
        document.getElementById('user-input').focus();
      }
    }

    // ── Append user bubble ─────────────────────────────────
    function appendUser(text) {
      const row = document.createElement('div');
      row.className = 'msg-row user';
      row.innerHTML = `
        <div class="bubble user">${escHtml(text)}</div>
        <div class="avatar user">ME</div>`;
      insertBeforeTyping(row);
      scrollBottom();
    }

    // ── Append AI bubble ───────────────────────────────────
    function appendAI(raw) {
      const row = document.createElement('div');
      row.className = 'msg-row';

      // 1. Detect artefact type badge
      const badge = detectBadge(raw);

      // 2. Extract scope creep alerts
      let scopeHtml = '';
      raw = raw.replace(/⚠️ VARIATION ORDER[^\n]*/g, match => {
        scopeHtml += `<div class="scope-alert">⚠️ ${escHtml(match.replace('⚠️ ', ''))}</div>`;
        return '';
      });

      // 3. Extract safety notices
      let safetyHtml = '';
      raw = raw.replace(/⚠️ SAFETY NOTICE:[^\n]*/g, match => {
        safetyHtml += `<div class="safety-notice">🔴 ${escHtml(match.replace('⚠️ ', ''))}</div>`;
        return '';
      });

      // 4. Extract mermaid blocks before markdown processing
      const diagrams = [];
      raw = raw.replace(/```mermaid([\s\S]*?)```/g, (_, code) => {
        const idx = diagramIndex++;
        diagrams.push({ idx, code: code.trim() });
        return `<<<DIAGRAM_${idx}>>>`;
      });

      // 5. Markdown → HTML
      let html = markdownToHtml(raw);

      // 6. Re-inject diagram containers
      diagrams.forEach(({ idx, code }) => {
        const safeCode = code.replace(/"/g, '&quot;');
        html = html.replace(`<<<DIAGRAM_${idx}>>>`, `
          <div class="diagram-wrap">
            <div class="diagram-header">
              <span class="diagram-label">State Transition Diagram</span>
              <button class="dl-btn" onclick="downloadDiagram(${idx})">⬇ Export PNG</button>
            </div>
            <div class="mermaid-render" id="mermaid-${idx}" data-src="${safeCode}"></div>
          </div>`);
      });

      row.innerHTML = `
        <div class="avatar ai">VR</div>
        <div class="bubble ai">${badge}${scopeHtml}${safetyHtml}${html}</div>`;

      insertBeforeTyping(row);
      scrollBottom();

      // 7. Render mermaid diagrams asynchronously
      diagrams.forEach(({ idx }) => {
        const el  = document.getElementById(`mermaid-${idx}`);
        const src = el?.getAttribute('data-src');
        if (!el || !src) return;
        mermaid.render(`mermaid-svg-${idx}`, src)
          .then(({ svg }) => { el.innerHTML = svg; })
          .catch(err => {
            el.innerHTML = `<pre style="color:var(--danger);font-size:0.8em">` +
              `Diagram error: ${escHtml(err.message)}</pre>`;
          });
      });
    }

    // ── Artefact badge detection ───────────────────────────
    function detectBadge(raw) {
      if (/^\*\*FMEA Ref\*\*/m.test(raw))
        return '<span class="artefact-badge badge-fmea">FMEA</span>';
      if (/^\*\*Hazard Ref\*\*/m.test(raw))
        return '<span class="artefact-badge badge-hazard">Hazard Log</span>';
      if (/^\*\*Use Case No\*\*/m.test(raw))
        return '<span class="artefact-badge badge-uc">Use Case</span>';
      if (/^\*\*Test Case Ref\*\*/m.test(raw))
        return '<span class="artefact-badge badge-tc">Test Specification</span>';
      if (/```mermaid/.test(raw))
        return '<span class="artefact-badge badge-sd">State Diagram</span>';
      return '';
    }

    // ── PNG Export ─────────────────────────────────────────
    window.downloadDiagram = function(idx) {
      const el    = document.getElementById(`mermaid-${idx}`);
      const svgEl = el?.querySelector('svg');
      if (!svgEl) {
        alert('Diagram not rendered yet — please wait a moment and try again.');
        return;
      }
      const svgData = new XMLSerializer().serializeToString(svgEl);
      const blob    = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
      const url     = URL.createObjectURL(blob);
      const img     = new Image();
      img.onload = () => {
        const scale  = 2;
        const canvas = document.createElement('canvas');
        canvas.width  = img.naturalWidth  * scale;
        canvas.height = img.naturalHeight * scale;
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        const link    = document.createElement('a');
        link.download = `voxrail-diagram-${idx + 1}.png`;
        link.href     = canvas.toDataURL('image/png');
        link.click();
      };
      img.onerror = () => {
        const link    = document.createElement('a');
        link.download = `voxrail-diagram-${idx + 1}.svg`;
        link.href     = url;
        link.click();
      };
      img.src = url;
    };

    // ── Markdown → HTML ────────────────────────────────────
    function markdownToHtml(md) {
      let s = escHtml(md);

      // Restore diagram placeholders
      s = s.replace(/&lt;&lt;&lt;DIAGRAM_(\d+)&gt;&gt;&gt;/g, '<<<DIAGRAM_$1>>>');

      // Fenced code blocks
      s = s.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>');

      // Inline code
      s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');

      // GFM tables
      s = s.replace(/((?:\|.+\|\n?)+)/g, match => {
        const lines = match.trim().split('\n').filter(l => l.trim());
        if (lines.length < 2) return match;
        const th = lines[0].split('|').map(c => c.trim()).filter(Boolean)
          .map(c => `<th>${c}</th>`).join('');
        const rows = lines.slice(2).map(l =>
          '<tr>' + l.split('|').map(c => c.trim()).filter(Boolean)
            .map(c => `<td>${c}</td>`).join('') + '</tr>'
        ).join('');
        return `<table><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table>`;
      });

      // Headings
      s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
      s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

      // Bold and italic
      s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      s = s.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
      s = s.replace(/\*(.+?)\*/g,         '<em>$1</em>');

      // Unordered lists
      s = s.replace(/((?:^- .+\n?)+)/gm, match => {
        const items = match.trim().split('\n')
          .map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
        return `<ul>${items}</ul>`;
      });

      // Ordered lists
      s = s.replace(/((?:^\d+\. .+\n?)+)/gm, match => {
        const items = match.trim().split('\n')
          .map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
        return `<ol>${items}</ol>`;
      });

      // Horizontal rule
      s = s.replace(/^---$/gm, '<hr>');

      // Paragraphs
      s = s.replace(/\n{2,}/g, '</p><p>');
      s = '<p>' + s + '</p>';
      s = s.replace(/\n/g, '<br>');

      return s;
    }

    // ── Utilities ──────────────────────────────────────────
    function escHtml(str) {
      if (typeof str !== 'string') return '';
      return str
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function insertBeforeTyping(el) {
      const ind = document.getElementById('typing-indicator');
      document.getElementById('messages').insertBefore(el, ind);
    }

    function scrollBottom() {
      const m = document.getElementById('messages');
      m.scrollTop = m.scrollHeight;
    }

    // ── Keyboard ───────────────────────────────────────────
    document.getElementById('user-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('send-btn').addEventListener('click', sendMessage);
  </script>
</body>
